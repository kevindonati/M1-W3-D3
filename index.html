<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="./assets/css/reset-style.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <main>
      <section class="card">
        <h1>To Do List</h1>
        <form>
          <label for="items">Aggiungi un'attività</label>
          <input
            id="items"
            type="text"
            placeholder="Scrivi la task da aggiungere..."
          />
          <button id="add-btn">
            <i id="icona" class="fas fa-plus"></i>Aggiungi
          </button>
        </form>
      </section>
      <section id="saved-task"></section>
    </main>
    <script src="./assets/script/script.js"></script>
  </body>
</html>
